name: Build and Deploy MVC App to Azure

on:
  push:
    branches:
      - master



jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore Dependencies
      run: dotnet restore ./WebApplication_MVC_CRUD/WebApplication_MVC_CRUD.csproj

    - name: Build Project
      run: dotnet build ./WebApplication_MVC_CRUD/WebApplication_MVC_CRUD.csproj --configuration Release --no-restore

    - name: Publish Project
      run: dotnet publish ./WebApplication_MVC_CRUD/WebApplication_MVC_CRUD.csproj --configuration Release --output ./publish

    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v3
      with:
        app-name: webapp-mvc-gpgsfscwaveehtcd
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        package: ./publish
